<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Шёпот — приватный чат</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#12151A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Шёпот" />
<style>
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body { background: #12151A; color: #ECEAE4; font-family: 'Inter', sans-serif; }
  input { font-family: inherit; }
  .breathe { animation: breathe 3s ease-in-out infinite; }
  @keyframes breathe { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
  @keyframes riseIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .screen { display: flex; flex-direction: column; height: 100vh; }
  .hidden { display: none !important; }

  /* join screen */
  #join-screen { align-items: center; justify-content: center; padding: 24px; }
  .join-box { width: 100%; max-width: 360px; }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .brand span { font-size: 13px; letter-spacing: 1px; color: #7C8494; text-transform: uppercase; }
  .join-box h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 32px; margin: 4px 0 8px; line-height: 1.15; }
  .join-box p.lead { color: #8B92A0; font-size: 14px; line-height: 1.5; margin: 0 0 28px; }
  label.field-label { display: block; font-size: 12px; color: #7C8494; margin-bottom: 6px; }
  input.field { width: 100%; background: #1E232B; border: 1px solid #2A303A; border-radius: 10px; padding: 11px 13px; color: #ECEAE4; font-size: 14.5px; outline: none; }
  .error-text { color: #E3877A; font-size: 13px; margin-top: 10px; line-height: 1.4; }
  #join-btn { width: 100%; margin-top: 22px; padding: 13px 0; border-radius: 10px; border: none; background: #4FA98C; color: #0D1512; font-weight: 600; font-size: 15px; cursor: pointer; }
  #join-btn:disabled { opacity: 0.6; cursor: default; }
  .note { margin-top: 26px; font-size: 12px; color: #5B6270; line-height: 1.6; display: flex; gap: 8px; }

  /* chat screen */
  #chat-screen header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #1E232B; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .header-left .title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .header-right .who { display: flex; align-items: center; gap: 5px; color: #7C8494; font-size: 12px; }
  #leave-btn { background: none; border: none; color: #7C8494; cursor: pointer; display: flex; }

  #messages { flex: 1; overflow-y: auto; padding: 16px; }
  .empty-state { text-align: center; color: #5B6270; font-size: 14px; margin-top: 60px; }
  .msg-row { display: flex; flex-direction: column; margin-bottom: 10px; animation: riseIn 0.25s ease-out; }
  .msg-row.self { align-items: flex-end; }
  .msg-row.other { align-items: flex-start; }
  .msg-sender { font-size: 11px; color: #7C8494; margin-bottom: 3px; margin-left: 4px; }
  .bubble { max-width: 78%; padding: 9px 13px; font-size: 14.5px; line-height: 1.4; word-break: break-word; }
  .bubble.self { border-radius: 14px 14px 3px 14px; background: #4FA98C; color: #0D1512; }
  .bubble.other { border-radius: 14px 14px 14px 3px; background: #1E232B; color: #ECEAE4; }

  #chat-error { color: #E3877A; font-size: 12.5px; padding: 0 16px 6px; text-align: center; }
  .composer { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid #1E232B; flex-shrink: 0; }
  #draft { flex: 1; background: #1E232B; border: 1px solid #2A303A; border-radius: 20px; padding: 10px 16px; color: #ECEAE4; font-size: 14.5px; outline: none; }
  #send-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: #232830; color: #5B6270; display: flex; align-items: center; justify-content: center; cursor: default; flex-shrink: 0; }
  #send-btn.active { background: #4FA98C; color: #0D1512; cursor: pointer; }
</style>
</head>
<body>

<div id="join-screen" class="screen">
  <div class="join-box">
    <div class="brand">
      <svg class="breathe" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#E3B575" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>Шёпот</span>
    </div>
    <h1>Комната только для своих</h1>
    <p class="lead">Придумайте секретную фразу и передайте её собеседникам лично или в другом канале — она же станет ключом шифрования. Никто без неё не прочитает переписку.</p>

    <label class="field-label">Ваше имя</label>
    <input class="field" id="name-input" maxlength="24" placeholder="Например, Аня" />
    <label class="field-label" style="margin-top:16px;">Секретная фраза комнаты</label>
    <input class="field" id="pass-input" type="password" placeholder="Только вы трое должны её знать" />
    <div id="join-error" class="error-text" style="display:none;"></div>
    <button id="join-btn">Войти в комнату</button>

    <div class="note">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#5B6270" stroke-width="2" style="flex-shrink:0;margin-top:1px;"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
      <span>Сообщения шифруются в браузере до отправки. Firebase хранит только шифротекст — не читаемые сообщения.</span>
    </div>
  </div>
</div>

<div id="chat-screen" class="screen hidden">
  <header>
    <div class="header-left">
      <svg class="breathe" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E3B575" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span class="title">Шёпот</span>
    </div>
    <div class="header-right">
      <div class="who">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#7C8494" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span id="who-name"></span>
      </div>
      <button id="leave-btn" aria-label="Выйти из комнаты">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#7C8494" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <div id="messages"></div>
  <div id="chat-error" style="display:none;"></div>

  <div class="composer">
    <input id="draft" placeholder="Сообщение…" autocomplete="off" />
    <button id="send-btn" aria-label="Отправить">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getDatabase, ref, push, onValue, off } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

// --- Firebase ---
const firebaseConfig = {
  apiKey: "AIzaSyBtFn-vFeWSkQ995QHex-clI7Nkf2E3Hgs",
  authDomain: "tetatet-ffe53.firebaseapp.com",
  databaseURL: "https://tetatet-ffe53-default-rtdb.firebaseio.com",
  projectId: "tetatet-ffe53",
  storageBucket: "tetatet-ffe53.firebasestorage.app",
  messagingSenderId: "747127797579",
  appId: "1:747127797579:web:63381a14779fd6f228dace",
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function roomRef(roomHash) { return ref(db, `rooms/${roomHash}`); }
async function sendMessage(roomHash, entry) {
  const newRef = await push(roomRef(roomHash), entry);
  return newRef.key;
}
function subscribeRoom(roomHash, callback) {
  const r = roomRef(roomHash);
  const handler = (snapshot) => {
    const val = snapshot.val() || {};
    const messages = Object.entries(val).map(([id, m]) => ({ id, ...m }));
    messages.sort((a, b) => a.ts - b.ts);
    callback(messages);
  };
  onValue(r, handler);
  return () => off(r, "value", handler);
}

// --- crypto ---
const enc = new TextEncoder();
const dec = new TextDecoder();
function toB64(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function fromB64(str) { return Uint8Array.from(atob(str), c => c.charCodeAt(0)).buffer; }

async function hashRoom(passphrase) {
  const digest = await crypto.subtle.digest("SHA-256", enc.encode(passphrase.trim()));
  return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, "0")).join("").slice(0, 24);
}
async function deriveKey(passphrase) {
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(passphrase.trim()), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: enc.encode("whisper-room-salt-v1"), iterations: 120000, hash: "SHA-256" },
    keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
  );
}
async function encryptText(key, text) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(text));
  return { iv: toB64(iv), ct: toB64(ct) };
}
async function decryptText(key, iv, ct) {
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: fromB64(iv) }, key, fromB64(ct));
  return dec.decode(plain);
}

// --- state ---
let cryptoKey = null;
let passphraseValue = "";
let unsubscribe = null;
const decryptedCache = new Map();
const ownIds = new Set();

// --- DOM refs ---
const joinScreen = document.getElementById("join-screen");
const chatScreen = document.getElementById("chat-screen");
const nameInput = document.getElementById("name-input");
const passInput = document.getElementById("pass-input");
const joinError = document.getElementById("join-error");
const joinBtn = document.getElementById("join-btn");
const whoName = document.getElementById("who-name");
const leaveBtn = document.getElementById("leave-btn");
const messagesEl = document.getElementById("messages");
const chatError = document.getElementById("chat-error");
const draftInput = document.getElementById("draft");
const sendBtn = document.getElementById("send-btn");

function showJoinError(msg) { joinError.textContent = msg; joinError.style.display = msg ? "block" : "none"; }
function showChatError(msg) { chatError.textContent = msg; chatError.style.display = msg ? "block" : "none"; }

function renderMessages() {
  const list = Array.from(decryptedCache.entries())
    .map(([id, m]) => ({ id, ...m, self: ownIds.has(id) }))
    .sort((a, b) => a.ts - b.ts);

  if (list.length === 0) {
    messagesEl.innerHTML = `<div class="empty-state">Пока тихо. Напишите первое сообщение —<br/>остальные увидят его мгновенно.</div>`;
    return;
  }
  messagesEl.innerHTML = list.map(m => `
    <div class="msg-row ${m.self ? "self" : "other"}">
      ${!m.self ? `<span class="msg-sender">${escapeHtml(m.sender)}</span>` : ""}
      <div class="bubble ${m.self ? "self" : "other"}">${escapeHtml(m.text)}</div>
    </div>
  `).join("");
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

async function handleSnapshot(raw) {
  if (!cryptoKey) return;
  for (const m of raw) {
    if (!decryptedCache.has(m.id)) {
      try {
        const text = await decryptText(cryptoKey, m.iv, m.ct);
        decryptedCache.set(m.id, { sender: m.sender, text, ts: m.ts });
      } catch {
        decryptedCache.set(m.id, { sender: m.sender, text: "⚠ не удалось расшифровать", ts: m.ts });
      }
    }
  }
  renderMessages();
}

async function handleJoin() {
  showJoinError("");
  const name = nameInput.value.trim();
  const passphrase = passInput.value.trim();
  if (!name || !passphrase) { showJoinError("Укажи имя и секретную фразу комнаты."); return; }
  if (passphrase.length < 6) { showJoinError("Секретная фраза должна быть не короче 6 символов — это и есть ваш ключ шифрования."); return; }
  if (!window.crypto?.subtle) { showJoinError("Браузер не даёт доступа к Web Crypto API. Открой сайт по HTTPS в обычном браузере."); return; }

  joinBtn.disabled = true;
  joinBtn.textContent = "Открываем…";
  try {
    cryptoKey = await deriveKey(passphrase);
    passphraseValue = passphrase;
    const room = await hashRoom(passphrase);
    decryptedCache.clear();
    ownIds.clear();
    whoName.textContent = name;
    unsubscribe = subscribeRoom(room, handleSnapshot);
    joinScreen.classList.add("hidden");
    chatScreen.classList.remove("hidden");
  } catch (err) {
    showJoinError(`Не получилось открыть комнату: ${err?.message || "неизвестная ошибка"}.`);
  } finally {
    joinBtn.disabled = false;
    joinBtn.textContent = "Войти в комнату";
  }
}

function handleLeave() {
  if (unsubscribe) unsubscribe();
  unsubscribe = null;
  cryptoKey = null;
  decryptedCache.clear();
  ownIds.clear();
  draftInput.value = "";
  passInput.value = "";
  chatScreen.classList.add("hidden");
  joinScreen.classList.remove("hidden");
}

async function handleSend() {
  const text = draftInput.value.trim();
  if (!text || !cryptoKey) return;
  draftInput.value = "";
  updateSendBtnState();
  try {
    const { iv, ct } = await encryptText(cryptoKey, text);
    const room = await hashRoom(passphraseValue);
    const entry = { sender: nameInput.value.trim(), iv, ct, ts: Date.now() };
    const id = await sendMessage(room, entry);
    ownIds.add(id);
    showChatError("");
  } catch {
    showChatError("Сообщение не отправилось — проверь соединение и попробуй снова.");
  }
}

function updateSendBtnState() {
  const active = draftInput.value.trim().length > 0;
  sendBtn.classList.toggle("active", active);
  sendBtn.style.cursor = active ? "pointer" : "default";
}

joinBtn.addEventListener("click", handleJoin);
passInput.addEventListener("keydown", (e) => { if (e.key === "Enter") handleJoin(); });
leaveBtn.addEventListener("click", handleLeave);
sendBtn.addEventListener("click", handleSend);
draftInput.addEventListener("keydown", (e) => { if (e.key === "Enter") handleSend(); });
draftInput.addEventListener("input", updateSendBtnState);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
